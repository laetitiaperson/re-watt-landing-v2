<!--
  ============================================================
  Re-Watt — Page Mentions Légales à coller dans WordPress
  ============================================================
  1. Pages > Ajouter > titre "Mentions légales"
  2. Permalien (slug) : mentions-legales
  3. Modèle : 'Conteneur vide' / 'Page vierge'
  4. Ajouter un bloc 'HTML personnalisé', coller TOUT ce fichier.
  5. Publier.
  ============================================================
-->

<style>
    :root {
      --vert-rewatt: #4CAF50;
      --anthracite: #2B2B2B;
      --gris-texte: #5C5C5C;
      --bg: #FAFAF7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--anthracite);
      background: var(--bg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 96px 24px;
    }
    h1 {
      font-size: clamp(1.75rem, 3vw, 2.5rem);
      font-weight: 700;
      margin: 0 0 24px;
    }
    p { color: var(--gris-texte); }
    a {
      color: var(--vert-rewatt);
      text-decoration: underline;
      text-underline-offset: 2px;
      font-weight: 500;
    }
    a:hover { color: #3D9140; }
    a:focus-visible {
      outline: 3px solid var(--vert-rewatt);
      outline-offset: 3px;
      border-radius: 4px;
    }
    .back {
      display: inline-block;
      margin-top: 32px;
      font-size: 0.9375rem;
    }
  </style>

<main>
    <h1>Mentions légales</h1>
    <p>Contenu à venir.</p>
    <a class="back" href="/">← Retour à l'accueil</a>
  </main>
